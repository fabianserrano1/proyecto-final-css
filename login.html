<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="iniciar s">
    <link rel="icon" href="./favicon.ico" sizes="any">
</head>
<body>

<header class="site-header">
    <div class="site-header__container">

    <a href="./index.html" class="site-header__logo">
      <img src="./img/comun/Conquer-Blocks-logo.png" alt="Conquer Blocks">
    </a>

    <input 
      type="checkbox" 
      id="menu-toggle" 
      class="site-header__toggle"
      aria-label="Abrir menú"
    >

    <label for="menu-toggle" class="site-header__hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <nav class="site-header__nav">
      <ul class="site-header__menu">
        <li><a href="./index.html">Inicio</a></li>
        <li><a href="./quienes_somos.html">Quiénes somos</a></li>
        <li><a href="./cursos.html">Cursos</a></li>
        <li><a href="./blog.html">Blog</a></li>
        <li><a href="./registro.html">Registro</a></li>
        <li><a href="./login.html" class="active">Login</a></li>
        <li><a href="./contacto.html">Contacto</a></li>
      </ul>
    </nav>

  </div>
</header>

    <main class="login-page">

  <section class="login-intro">
    <h1 class="login-intro__title">
      Accede a tu cuenta de
      <span>Conquer Blocks</span>
    </h1>

    <p class="login-intro__subtitle">
      Ingresa tus datos para continuar con nuestros cursos y contenidos exclusivos.
    </p>
  </section>


  <div class="login-card">

    <form class="login-form" action="#" method="post">

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" name="email" id="email" placeholder="tu@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña *</label>
        <input type="password" name="password" id="password" placeholder="********" required>
      </div>

      <div class="form-buttons">
        <button type="submit" class="btn-primary">Iniciar sesión</button>
        <input type="reset" class="btn-secondary" value="Borrar">
      </div>

    </form>

  </div>

</main>

<footer class="site-footer">
  <div class="site-footer__social">
    <a href="https://www.instagram.com/conquerblocks" target="_blank" aria-label="Instagram">
      <img src="./img/comun/instagram-icon.svg" alt="Instagram">
    </a>
    <a href="https://www.linkedin.com/company/conquer-blocks" target="_blank" aria-label="LinkedIn">

    </a>
    <a href="https://www.facebook.com/conquerblocks" target="_blank" aria-label="Facebook">

    </a>
    <a href="https://x.com/conquerblocks" target="_blank" aria-label="X">

    </a>
  </div>


  <div class="site-footer__legal">

    <div class="legal-links">
      <a href="./aviso_legal.html">Aviso Legal</a> | 
      <a href="./privacidad.html">Política de Privacidad</a>

  </div>
</footer>
